name: Build and Push Closures

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out
        required: true
        type: string
      config_type:
        description: Configuration type suffix to build, for example dev or prod
        required: true
        type: string
      build_label:
        description: Human-readable label for workflow summary output
        required: true
        type: string
    secrets:
      attic_token:
        description: Attic authentication token
        required: true
      tailscale_oauth_client_id:
        description: Tailscale OAuth client ID
        required: true
      tailscale_oauth_secret:
        description: Tailscale OAuth secret
        required: true
    outputs:
      built_configs:
        description: JSON array of concrete configuration names built by this workflow
        value: ${{ jobs.discover.outputs.configs_json }}
      config_count:
        description: Number of concrete configurations built by this workflow
        value: ${{ jobs.discover.outputs.config_count }}

jobs:
  discover:
    name: Discover matching configs
    runs-on: ubuntu-latest
    outputs:
      configs_json: ${{ steps.discover.outputs.configs_json }}
      config_count: ${{ steps.discover.outputs.config_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Discover concrete configs
        id: discover
        run: |
          all_configs="$(nix eval --json .#nixosConfigurations --apply builtins.attrNames --accept-flake-config)"
          configs_json="$(jq -c --arg suffix "-${{ inputs.config_type }}" '[.[] | select(endswith($suffix))] | sort' <<<"$all_configs")"
          config_count="$(jq 'length' <<<"$configs_json")"

          if [[ "$config_count" -eq 0 ]]; then
            echo "::error::No nixosConfigurations matched suffix -${{ inputs.config_type }}"
            exit 1
          fi

          configs_inline="$(jq -r 'join(", ")' <<<"$configs_json")"
          echo "configs_json=$configs_json" >> "$GITHUB_OUTPUT"
          echo "config_count=$config_count" >> "$GITHUB_OUTPUT"

          echo "### ${{ inputs.build_label }} configs" >> "$GITHUB_STEP_SUMMARY"
          echo "$configs_inline" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build and push ${{ matrix.config_name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config_name: ${{ fromJson(needs.discover.outputs.configs_json) }}
    # Run all shell steps inside the flake-pinned CI devshell so tools like
    # attic-client come from this repo's locked nixpkgs input.
    defaults:
      run:
        shell: nix develop --accept-flake-config .#ci --command bash -euo pipefail {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
          image: tonistiigi/binfmt:qemu-v9.2.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-platforms = aarch64-linux
            extra-substituters = https://cache.dartkit.pl/dartkitos https://nixos-raspberrypi.cachix.org
            extra-trusted-substituters = https://cache.dartkit.pl/dartkitos https://nixos-raspberrypi.cachix.org
            extra-trusted-public-keys = dartkitos:qbEVIC7PCAV2tfg+nUbUT9LqK30r6sdh9vOOcoiag40= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          use-cache: 'true'
          oauth-client-id: ${{ secrets.tailscale_oauth_client_id }}
          oauth-secret: ${{ secrets.tailscale_oauth_secret }}
          tags: tag:ci

      - name: Verify Attic client from CI devshell
        run: |
          attic --version

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.attic_token }}
        run: |
          # Attic is reached via a Tailscale-only hostname inside a private tailnet.
          # HTTP is acceptable in this topology; traffic is encrypted/authenticated by WireGuard.
          attic login dartkit http://attic.deer-bangus.ts.net:8080 "$ATTIC_TOKEN"
          attic cache info dartkitos

      - name: Build closure
        id: build
        run: |
          nix build ".#${{ matrix.config_name }}" \
            --print-build-logs \
            --accept-flake-config \
            --option system aarch64-linux \
            --extra-platforms aarch64-linux

          store_path="$(readlink -f ./result)"
          echo "Built: $store_path"
          echo "### ${{ inputs.build_label }} build output: ${{ matrix.config_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$store_path" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Push closure to cache
        run: |
          for i in {1..5}; do
            if attic push dartkitos ./result -j 4; then
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Collect build metadata
        id: meta
        run: |
          closure_size="$(nix path-info -S ./result 2>/dev/null | awk '{print $2}' || echo "unknown")"
          echo "**${{ inputs.build_label }} closure size for ${{ matrix.config_name }}:** $closure_size bytes" >> "$GITHUB_STEP_SUMMARY"
