# ============================================================
# DartkitOS Release Pipeline
# ============================================================
# Manually triggered. Builds the full NixOS closure for
# aarch64-linux using QEMU emulation, pushes every store path
# to the Attic binary cache, and publishes a GitHub Release.
#
# Version tags are created automatically by a semantic-versioning
# tagger (conventional commits). This workflow is only run when
# you explicitly decide to cut a release for a given tag.
#
# Prerequisites (repository secrets):
#   ATTIC_TOKEN   — Attic authentication token for cache.dartkit.pl
# ============================================================
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release (e.g. v1.2.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Job 1: Fast validation (no QEMU, no aarch64) ────────────
  # Evaluates the flake and checks for configuration errors.
  # Fails fast before committing to the expensive build.
  check:
    name: Validate configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Verify tag exists and is a valid ref
        run: |
          git tag --list "${{ github.event.inputs.tag }}" | grep -q . \
            || (echo "::error::Tag ${{ github.event.inputs.tag }} not found" && exit 1)

      - name: Verify required secrets
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          if [[ -z "$ATTIC_TOKEN" ]]; then
            echo "::error::ATTIC_TOKEN secret is not set. Go to Settings → Secrets → Actions to add it."
            exit 1
          fi
          if [[ -z "$TS_OAUTH_CLIENT_ID" ]] || [[ -z "$TS_OAUTH_SECRET" ]]; then
            echo "::error::Tailscale OAuth secrets not set. Add TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Evaluate flake outputs
        run: |
          nix flake check --no-build --all-systems --accept-flake-config

  # ── Job 2: Build, push to cache, publish release ─────────────
  # Only runs after validation passes.
  build-and-push:
    name: Build & push to cache
    needs: check
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      # ── QEMU for aarch64 emulation ───────────────────────────
      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── Install Nix ──────────────────────────────────────────
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-platforms = aarch64-linux
            extra-substituters = https://cache.dartkit.pl/dartkitos
            extra-trusted-substituters = https://cache.dartkit.pl/dartkitos
            extra-trusted-public-keys = dartkitos:qbEVIC7PCAV2tfg+nUbUT9LqK30r6sdh9vOOcoiag40=

      # ── Register binfmt for aarch64 ──────────────────────────
      - name: Register binfmt interpreters
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      # ── Connect to Tailscale ─────────────────────────────────
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          use-cache: 'true'
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Install Attic client ─────────────────────────────────
      - name: Install Attic client
        run: |
          nix profile add github:NixOS/nixpkgs/nixos-25.11#attic-client

      # ── Configure Attic ──────────────────────────────────────
      - name: Configure Attic
        run: |
          attic login dartkit http://attic.deer-bangus.ts.net:8080 "${{ secrets.ATTIC_TOKEN }}"
          attic cache info dartkitos

      # ── Build the NixOS system closure ───────────────────────
      - name: Build DartkitOS closure
        run: |
          nix build .#default \
            --print-build-logs \
            --accept-flake-config \
            --option system aarch64-linux \
            --extra-platforms aarch64-linux

          STORE_PATH=$(readlink -f ./result)
          echo "Built: $STORE_PATH"
          echo "### 📦 Build output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$STORE_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── Push closure to Attic ────────────────────────────────
      - name: Push closure to cache
        run: |
          for i in {1..5}; do
            if attic push dartkitos ./result -j 4; then
              exit 0
            fi
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done
          exit 1
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

      # ── Derive release info ──────────────────────────────────
      - name: Get release metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

          # Closure size info for release notes
          CLOSURE_SIZE=$(nix path-info -S ./result 2>/dev/null | awk '{print $2}' || echo "unknown")
          echo "closure_size=$CLOSURE_SIZE" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "DartkitOS ${{ steps.meta.outputs.tag }}"
          body: |
            ## DartkitOS ${{ steps.meta.outputs.tag }}

            **Released:** ${{ steps.meta.outputs.date }}
            **Closure size:** ${{ steps.meta.outputs.closure_size }} bytes

            ### What's included
            - Full NixOS system closure for Raspberry Pi 4 (aarch64-linux)
            - All store paths pushed to `cache.dartkit.pl/dartkitos`

            ### For consumers
            Consumers with OTA updates enabled will pick up this release
            automatically within their configured check interval (default: 15 min).

            To update manually:
            ```
            sudo dartkitos-update
            ```
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, 'rc') || contains(steps.meta.outputs.tag, 'beta') || contains(steps.meta.outputs.tag, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
