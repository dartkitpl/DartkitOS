# ============================================================
# DartkitOS Release Pipeline
# ============================================================
# Manually triggered. Runs a two-stage release pipeline:
#   1. Build and push all dev closures for QA
#   2. Wait for manual approval, then build and push all prod
#      closures and publish the GitHub Release
#
# Version tags are created automatically by a semantic-versioning
# tagger (conventional commits). This workflow is only run when
# you explicitly decide to cut a release for a given tag.
#
# Prerequisites (repository secrets):
#   ATTIC_TOKEN   — Attic authentication token for cache.dartkit.pl
#   TS_OAUTH_CLIENT_ID — Tailscale OAuth client ID for cache access
#   TS_OAUTH_SECRET — Tailscale OAuth secret for cache access
# ============================================================
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release (e.g. v1.2.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Job 1: Fast validation (no QEMU, no aarch64) ────────────
  # Evaluates the flake and checks for configuration errors.
  # Fails fast before committing to the expensive build.
  check:
    name: Validate configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Verify tag exists and is a valid ref
        run: |
          git tag --list "${{ github.event.inputs.tag }}" | grep -q . \
            || (echo "::error::Tag ${{ github.event.inputs.tag }} not found" && exit 1)

      - name: Verify required secrets
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          if [[ -z "$ATTIC_TOKEN" ]]; then
            echo "::error::ATTIC_TOKEN secret is not set. Go to Settings → Secrets → Actions to add it."
            exit 1
          fi
          if [[ -z "$TS_OAUTH_CLIENT_ID" ]] || [[ -z "$TS_OAUTH_SECRET" ]]; then
            echo "::error::Tailscale OAuth secrets not set. Add TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Evaluate flake outputs
        run: |
          nix flake check --no-build --all-systems --accept-flake-config

  # ── Job 2: Build dev closures and push to cache ───────
  # This stage is intended for QA before production promotion.
  staging:
    name: Build & push dev configs
    needs: check
    uses: ./.github/workflows/build-and-push-closure.yml
    with:
      ref: ${{ github.event.inputs.tag }}
      config_type: dev
      build_label: "Development"
    secrets:
      attic_token: ${{ secrets.ATTIC_TOKEN }}
      tailscale_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      tailscale_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}

  # ── Job 3: Manual approval gate before production ───────────
  # Configure the "production" environment with required
  # reviewers in GitHub settings to enforce the approval gate.
  approve-production:
    name: Approve production
    needs: staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Wait for approval
        run: echo "Production approval granted."

  # ── Job 4: Build prod closures and push to cache ─────────────
  production:
    name: Build & push prod configs
    needs: [staging, approve-production]
    uses: ./.github/workflows/build-and-push-closure.yml
    with:
      ref: ${{ github.event.inputs.tag }}
      config_type: prod
      build_label: "Production"
    secrets:
      attic_token: ${{ secrets.ATTIC_TOKEN }}
      tailscale_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      tailscale_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}

  # ── Job 5: Publish GitHub Release ───────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [staging, production]
    runs-on: ubuntu-latest

    steps:
      # ── Derive release info ──────────────────────────────────
      - name: Get release metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

          STAGING_CONFIGS='${{ needs.staging.outputs.built_configs }}'
          PRODUCTION_CONFIGS='${{ needs.production.outputs.built_configs }}'

          {
            echo "staging_configs_inline=$(jq -r 'join(\", \")' <<<"$STAGING_CONFIGS")"
            echo "production_configs_inline=$(jq -r 'join(\", \")' <<<"$PRODUCTION_CONFIGS")"
            echo "staging_config_list<<EOF"
            jq -r '.[] | "- `\(.)`"' <<<"$STAGING_CONFIGS"
            echo "EOF"
            echo "production_config_list<<EOF"
            jq -r '.[] | "- `\(.)`"' <<<"$PRODUCTION_CONFIGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "**Development configs:** $(jq -r 'join(", ")' <<<"$STAGING_CONFIGS")" >> "$GITHUB_STEP_SUMMARY"
          echo "**Production configs:** $(jq -r 'join(", ")' <<<"$PRODUCTION_CONFIGS")" >> "$GITHUB_STEP_SUMMARY"

      # ── Create GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "DartkitOS ${{ steps.meta.outputs.tag }}"
          body: |
            ## DartkitOS ${{ steps.meta.outputs.tag }}

            **Released:** ${{ steps.meta.outputs.date }}
            **Development configs:** ${{ steps.meta.outputs.staging_configs_inline }}
            **Production configs:** ${{ steps.meta.outputs.production_configs_inline }}

            ### What's included
            #### Development / QA builds
            ${{ steps.meta.outputs.staging_config_list }}

            #### Production builds
            ${{ steps.meta.outputs.production_config_list }}

            All matching closures were built and pushed to `cache.dartkit.pl/dartkitos`.

            ### For consumers
            Consumers with OTA updates enabled will pick up this release
            automatically within their configured check interval (default: 15 min).

            To update manually:
            ```
            sudo dartkitos-update
            ```
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, 'rc') || contains(steps.meta.outputs.tag, 'beta') || contains(steps.meta.outputs.tag, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
