# ============================================================
# Automatic Version Tagging
# ============================================================
# Runs on every push to main. Analyses conventional commit
# messages since the last tag and bumps the version accordingly:
#
#   fix:      → patch  (v1.0.0 → v1.0.1)
#   feat:     → minor  (v1.0.0 → v1.1.0)
#   feat!:  / BREAKING CHANGE:  → major  (v1.0.0 → v2.0.0)
#
# If no commits warrant a bump, the workflow exits cleanly.
# Tags are created but no release is published — use the
# Release workflow (workflow_dispatch) for that.
# ============================================================
name: Version Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Semantic version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history needed for commit analysis

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Prefix tags with "v" (v1.0.0, v1.1.0, …)
          tag_prefix: "v"
          # Default bump when no conventional commit keywords found
          default_bump: false
          # Don't create a GitHub Release — that's the Release workflow's job
          create_annotated_tag: true

      - name: Summary
        if: steps.tag.outputs.new_tag
        run: |
          echo "### 🏷️ New tag: \`${{ steps.tag.outputs.new_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Previous:** \`${{ steps.tag.outputs.previous_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bump:** \`${{ steps.tag.outputs.release_type }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tag.outputs.changelog }}" >> "$GITHUB_STEP_SUMMARY"

      - name: No bump needed
        if: ${{ !steps.tag.outputs.new_tag }}
        run: |
          echo "### ✅ No version bump needed" >> "$GITHUB_STEP_SUMMARY"
          echo "No conventional commit keywords found since \`${{ steps.tag.outputs.previous_tag }}\`." >> "$GITHUB_STEP_SUMMARY"
