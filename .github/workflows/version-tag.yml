# ============================================================
# Automatic Version Tagging
# ============================================================
# Runs on every push to main. Analyses conventional commit
# messages since the last tag and creates the next version tag:
#
#   fix:            → patch  (v1.0.0 → v1.0.1)
#   feat:           → minor  (v1.0.0 → v1.1.0)
#   <any-type>!:    → major  (v1.0.0 → v2.0.0)
#
# Breaking changes are detected only from "!" in the commit
# header. BREAKING CHANGE footers are intentionally ignored.
#
# If no commits warrant a bump, the workflow exits cleanly.
# This workflow only creates git tags. It does not publish a
# GitHub Release or trigger the manual Release workflow.
# ============================================================
name: Version Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Semantic version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history needed for commit analysis

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        id: tag
        with:
          semantic_version: 24.2.7
          extra_plugins: |
            conventional-changelog-conventionalcommits@9.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.tag.outputs.new_release_git_tag != ''
        run: |
          last="${{ steps.tag.outputs.last_release_version }}"
          next="${{ steps.tag.outputs.new_release_version }}"

          if [[ -z "$last" ]]; then
            bump="initial"
          else
            IFS='.' read -r last_major last_minor last_patch <<< "$last"
            IFS='.' read -r next_major next_minor next_patch <<< "$next"

            if [[ "$next_major" != "$last_major" ]]; then
              bump="major"
            elif [[ "$next_minor" != "$last_minor" ]]; then
              bump="minor"
            else
              bump="patch"
            fi
          fi

          echo "### 🏷️ New tag: \`${{ steps.tag.outputs.new_release_git_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Previous:** \`${{ steps.tag.outputs.last_release_git_tag || 'none' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bump:** \`$bump\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tag.outputs.new_release_notes }}" >> "$GITHUB_STEP_SUMMARY"

      - name: No bump needed
        if: steps.tag.outputs.new_release_git_tag == ''
        run: |
          echo "### ✅ No version bump needed" >> "$GITHUB_STEP_SUMMARY"
          echo "No version bump required based on commits since \`${{ steps.tag.outputs.last_release_git_tag || 'the start of history' }}\`." >> "$GITHUB_STEP_SUMMARY"
